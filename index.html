<!DOCTYPE html>
<html class="light" lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anmelden - Streak System</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#f9f9f6", "on-background": "#1a1c1b",
        "surface": "#f9f9f6", "surface-dim": "#dadad7",
        "surface-container": "#eeeeeb", "surface-container-high": "#e8e8e5",
        "surface-container-low": "#f4f4f1", "surface-container-lowest": "#ffffff",
        "surface-variant": "#e2e3e0",
        "primary": "#b7001a", "primary-container": "#e60023",
        "on-primary": "#ffffff", "on-primary-container": "#fff7f6",
        "secondary": "#745b00", "secondary-container": "#fecb00",
        "on-secondary": "#ffffff", "on-secondary-container": "#6e5700",
        "on-surface": "#1a1c1b", "on-surface-variant": "#5e3f3c",
        "outline": "#936e6b", "outline-variant": "#e8bcb8",
        "error": "#ba1a1a", "on-error": "#ffffff",
        "berlin-ink": "#000000", "traffic-gold": "#FFCC00",
        "warm-canvas": "#f6f6f3", "concrete-gray": "#dadad3"
      },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      fontFamily: { headline: ["Manrope", "sans-serif"], display: ["Manrope", "sans-serif"], body: ["Inter", "sans-serif"], label: ["Inter", "sans-serif"] },
      fontSize: {
        "display-xl": ["70px", { lineHeight: "77px", letterSpacing: "-1.2px", fontWeight: "700" }],
        "headline-xl": ["28px", { lineHeight: "34px", letterSpacing: "-1.2px", fontWeight: "700" }],
        "headline-md": ["18px", { lineHeight: "24px", fontWeight: "600" }],
        "body-md": ["16px", { lineHeight: "22px", fontWeight: "400" }],
        "label-md": ["14px", { lineHeight: "14px", fontWeight: "700" }]
      }
    }
  }
}
</script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-background min-h-screen flex flex-col relative font-body text-on-background antialiased">
<div class="fixed inset-0 z-0 w-full h-full">
  <div class="absolute inset-0 w-full h-full bg-cover bg-center opacity-40 blur-sm scale-105 transform" style="background-image: url('https://images.unsplash.com/photo-1559586615-5ea7e1a0a8f3?w=1600&q=80')"></div>
  <div class="absolute inset-0 bg-background/80 backdrop-blur-[2px]"></div>
</div>
<main class="flex-grow flex items-center justify-center relative z-10 p-4 sm:p-8 w-full">
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl sm:rounded-[32px] p-6 sm:p-padding-modal border border-surface-dim shadow-[0_16px_40px_rgba(0,0,0,0.08)] flex flex-col items-center">
  <div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center mb-6">
    <span class="material-symbols-outlined text-primary-container symbol-fill">school</span>
  </div>
  <div class="text-center w-full mb-8">
    <h1 class="font-headline text-headline-xl text-on-background mb-2 tracking-tight">Willkommen zurück</h1>
    <p class="font-body text-body-md text-on-surface-variant">Setze dein Lernziel für heute fort.</p>
  </div>
  <!-- Error message -->
  <div id="auth-error" class="w-full hidden mb-4 p-3 rounded-lg bg-error-container text-on-error-container text-sm font-medium"></div>
  <!-- Login Form -->
  <form id="login-form" class="w-full flex flex-col gap-4">
    <div class="flex flex-col gap-1.5">
      <label class="font-label text-label-md text-on-surface ml-1" for="email">E-Mail</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-surface-variant">
          <span class="material-symbols-outlined text-[20px]">mail</span>
        </div>
        <input class="w-full pl-11 pr-4 py-3.5 rounded-[16px] bg-surface border border-surface-dim focus:bg-surface-container-lowest focus:border-2 focus:border-primary-container focus:ring-0 outline-none transition-all font-body text-body-md text-on-background placeholder:text-on-surface-variant/60 shadow-sm" id="email" name="email" placeholder="name@beispiel.de" required type="email">
      </div>
    </div>
    <div class="flex flex-col gap-1.5">
      <div class="flex justify-between items-center ml-1">
        <label class="font-label text-label-md text-on-surface" for="password">Passwort</label>
      </div>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-surface-variant">
          <span class="material-symbols-outlined text-[20px]">lock</span>
        </div>
        <input class="w-full pl-11 pr-4 py-3.5 rounded-[16px] bg-surface border border-surface-dim focus:bg-surface-container-lowest focus:border-2 focus:border-primary-container focus:ring-0 outline-none transition-all font-body text-body-md text-on-background placeholder:text-on-surface-variant/60 shadow-sm" id="password" name="password" placeholder="••••••••" required type="password">
      </div>
    </div>
    <!-- Name field (shown only for signup) -->
    <div id="name-field" class="flex flex-col gap-1.5 hidden">
      <label class="font-label text-label-md text-on-surface ml-1" for="name">Name</label>
      <input class="w-full px-4 py-3.5 rounded-[16px] bg-surface border border-surface-dim focus:bg-surface-container-lowest focus:border-2 focus:border-primary-container focus:ring-0 outline-none transition-all font-body text-body-md" id="name" placeholder="Dein Name" type="text">
    </div>
    <div class="mt-2 flex flex-col gap-3">
      <button id="submit-btn" class="w-full py-4 rounded-[16px] bg-primary-container text-on-primary-container font-label text-label-md shadow-sm hover:bg-primary-container/90 hover:-translate-y-0.5 active:translate-y-0 active:bg-primary transition-all duration-200 flex justify-center items-center gap-2" type="submit">
        Anmelden
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </button>
      <button id="google-btn" class="w-full py-3.5 rounded-[16px] bg-surface border border-surface-dim text-on-surface font-label text-label-md text-center hover:bg-surface-container-high hover:border-outline-variant transition-colors flex items-center justify-center gap-2" type="button">
        <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-2.5 7.2-9.3 12.4-17.3 12.4-10.1 0-18.3-8.2-18.3-18.4S13.9 3.6 24 3.6c4.7 0 8.9 1.8 12.1 4.7l5.7-5.7C37.8 0 31.3-2 24-2 11.4-2 1.2 8.2 1.2 20.8S11.4 43.6 24 43.6c11.1 0 20.5-7.9 22.7-18.6.4-1.9.6-3.9.6-5.9 0-1.2-.1-2.3-.3-3.4z" transform="translate(0,2)"/><path fill="#FF3D00" d="M3.3 12.5l6.6 4.8C12.1 13 17.7 9.6 24 9.6c3.2 0 6.1 1.1 8.4 3l6.2-6.2C34.8 2.3 29.7 0 24 0 15.9 0 8.8 5.3 5 12.7l-1.7-.2z" transform="translate(0,2)"/><path fill="#4CAF50" d="M24 43.6c5.5 0 10.5-1.9 14.3-5.1l-6.6-5.6c-2.1 1.4-4.7 2.3-7.7 2.3-5.6 0-10.3-3.8-12-9l-7 5.4c3.7 7.3 11.3 12.4 20 12.4z" transform="translate(0,2)"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-1.1 3.4-3.2 6.3-6 8.3l.1.1 6.6 5.6c-.5.4 7.4-5.4 7.4-16.6 0-1.6-.2-3.1-.5-4.5z" transform="translate(0,2)"/></svg>
        Mit Google anmelden
      </button>
      <div class="relative flex items-center py-1">
        <div class="flex-grow border-t border-surface-dim"></div>
        <span class="flex-shrink-0 mx-4 font-body text-[13px] text-on-surface-variant">oder</span>
        <div class="flex-grow border-t border-surface-dim"></div>
      </div>
      <button id="toggle-mode" class="w-full py-3.5 rounded-[16px] bg-surface border border-surface-dim text-on-surface font-label text-label-md text-center hover:bg-surface-container-high hover:border-outline-variant transition-colors" type="button">Konto erstellen</button>
    </div>
  </form>
  <p class="mt-8 text-center font-body text-[12px] text-on-surface-variant">Mit dem Anmelden akzeptierst du unsere AGB und Datenschutzrichtlinien.</p>
</div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/streak.js"></script>
<script src="js/auth.js"></script>
<script>
let isSignup = false;

document.getElementById('toggle-mode').addEventListener('click', () => {
  isSignup = !isSignup;
  document.getElementById('name-field').classList.toggle('hidden', !isSignup);
  document.getElementById('submit-btn').innerHTML = (isSignup ? 'Konto erstellen' : 'Anmelden') + ' <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
  document.getElementById('toggle-mode').textContent = isSignup ? 'Anmelden' : 'Konto erstellen';
  document.querySelector('h1').textContent = isSignup ? 'Los geht\'s!' : 'Willkommen zurück';
  document.querySelector('p.font-body').textContent = isSignup ? 'Erstelle dein Konto und starte deine Lernreise.' : 'Setze dein Lernziel für heute fort.';
});

document.getElementById('google-btn').addEventListener('click', async () => {
  document.getElementById('auth-error').classList.add('hidden');
  try {
    await signInWithGoogle();
    window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('auth-error').textContent = err.message;
    document.getElementById('auth-error').classList.remove('hidden');
  }
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value;
  const errDiv = document.getElementById('auth-error');
  const btn = document.getElementById('submit-btn');

  errDiv.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    if (isSignup) {
      await signup(email, password, name);
    } else {
      await login(email, password);
    }
    window.location.href = 'dashboard.html';
  } catch (err) {
    errDiv.textContent = err.message;
    errDiv.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = (isSignup ? 'Konto erstellen' : 'Anmelden') + ' <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
  }
});
</script>
</body>
</html>
